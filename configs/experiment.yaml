# 実験用設定（学習時間短縮）
environment:
  name: "BittleWalking-v0"
  max_episode_steps: 200  # 短縮
  control_frequency: 50
  physics_frequency: 240
  gravity: -9.81
  
robot:
  urdf_path: "bittle.urdf"
  initial_position: [0.0, 0.0, 0.1]
  initial_orientation: [0.0, 0.0, 0.0]
  joint_limits: [-1.22173, 1.22173]  # -70度 ～ +70度（安全な制限）
  max_torque: 2.0
  
rewards:
  forward_velocity_weight: 10.0
  survival_reward: 1.0
  fall_penalty: -100.0
  energy_efficiency_weight: -0.01
  
  # 前方行進促進のための新しい報酬要素
  target_height: 0.1                    # 目標高さ（10cm）
  height_stability_weight: 5.0          # 高さ安定性の重み
  vertical_velocity_penalty: 2.0        # 垂直速度ペナルティ
  distance_weight: 1.0                   # 前進距離の重み
  
termination:
  min_height: 0.025
  max_roll: 80.0
  max_pitch: 80.0

training:
  algorithm: "PPO"
  total_timesteps: 50000  # 実験用に短縮
  n_envs: 12  # シングル環境
  n_steps: 512  # 短縮
  learning_rate: 0.0003
  batch_size: 32  # 小さく
  n_epochs: 5  # 少なく
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  
save:
  frequency: 10000
  model_path: "./models"
  checkpoint_path: "./models/checkpoints"
  vec_normalize_path: "./models/vec_normalize.pkl"
  
evaluation:
  frequency: 10000
  n_eval_episodes: 3
  deterministic: true
  
logging:
  log_dir: "./logs"
  tensorboard: false
  verbose: 1
  debug_level: "INFO"
