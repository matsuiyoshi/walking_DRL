# Bittle四足歩行ロボット深層強化学習 - デフォルト設定

# 環境設定
environment:
  name: "BittleWalking-v0"
  max_episode_steps: 500
  control_frequency: 50
  physics_frequency: 240
  gravity: -9.81
  time_step: 0.004  # 1/240
  
# ロボット設定  
robot:
  urdf_path: "bittle.urdf"
  initial_position: [0.0, 0.0, 0.15]
  initial_orientation: [0.0, 0.0, 0.0]
  joint_limits: [-1.22173, 1.22173]  # -70度 ～ +70度（安全な制限）
  max_torque: 2.0
  
# 報酬設定
rewards:
  forward_velocity_weight: 10.0
  survival_reward: 1.0
  fall_penalty: -100.0
  energy_efficiency_weight: -0.01
  
  # 前方行進促進のための新しい報酬要素
  target_height: 0.1                    # 目標高さ（10cm）
  height_stability_weight: 5.0          # 高さ安定性の重み
  vertical_velocity_penalty: 2.0        # 垂直速度ペナルティ
  distance_weight: 1.0                   # 前進距離の重み
  
# 終了条件
termination:
  min_height: 0.025
  max_roll: 80.0   # 度
  max_pitch: 80.0  # 度

# 学習設定
training:
  algorithm: "PPO"
  total_timesteps: 1000000
  n_envs: 12
  n_steps: 2048
  learning_rate: 0.0003
  batch_size: 192  # 64 * 3 (12/4)
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  
# 保存設定
save:
  frequency: 100000
  model_path: "./models"
  checkpoint_path: "./models/checkpoints"
  vec_normalize_path: "./models/vec_normalize.pkl"
  
# 評価設定
evaluation:
  frequency: 50000
  n_eval_episodes: 5
  deterministic: true
  
# ログ設定
logging:
  log_dir: "./logs"
  tensorboard: true
  verbose: 1
  debug_level: "INFO"
